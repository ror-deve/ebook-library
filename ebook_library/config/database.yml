#   username: ebook_library
#   password: <%= ENV["EBOOK_LIBRARY_DATABASE_PASSWORD"] %>

default: &default
  adapter: postgresql
  pool: <%= ENV.fetch('RAILS_MAX_THREADS') { 20 } %>
  timeout: 5000
  url: <%= ENV['DATABASE_URL'] %>
  host: localhost
  username: postgres
  password: postgres

development:
  <<: *default
  database: ebook_library_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test: &test
  <<: *default
  database: ebook_library_test

production:
  <<: *default
  database: ebook_library_production
